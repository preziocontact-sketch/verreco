            React.createElement('td', null, React.createElement('span', { className:s.status==="active"?"badge-active":"badge-pending" }, s.status==="active"?"Actif":"En attente")),
            React.createElement('td', { style:{ color:"#888", fontSize:12 } }, s.joined),
            React.createElement('td', null,
              s.livre
                ? React.createElement('button', { className:"btn-delivre", onClick:()=>toggleLivre(s.id), title:"Cliquer pour annuler" }, "✓ Livrée")
                : React.createElement('button', { className:"btn-livrer", onClick:()=>toggleLivre(s.id) }, "Livrer")
            )
          ))
        )
      )
    )
  );

  if (activeTab === "tournees") return React.createElement('div', { style:{ padding:"1.25rem" } },
    React.createElement('div', { style:{ fontSize:15, fontWeight:700, marginBottom:"1rem" } }, "Collectes du mois"),
    React.createElement('div', { className:"card", style:{ background:"#fff8e6", border:"1px solid #FAC775", marginBottom:16 } },
      React.createElement('div', { style:{ fontSize:12, color:"#854F0B", fontWeight:600 } }, "📅 Les dates de collecte sont à communiquer en fin de mois à chaque secteur.")
    ),
    zones.map(z => React.createElement('div', { key:z.id, className:"card", style:{ marginBottom:12 } },
      React.createElement('div', { style:{ display:"flex", alignItems:"center", gap:10, marginBottom:12 } },
        React.createElement('span', { className:`zone-pill ${z.color}` }, z.id),
        React.createElement('div', { style:{ flex:1 } },
          React.createElement('div', { style:{ fontWeight:700, fontSize:14 } }, z.label),
          React.createElement('div', { style:{ fontSize:12, color:"#888" } }, "1 collecte / mois")
        )
      ),
      subs.filter(s=>s.zone===z.id).map((s,i) => React.createElement('div', { key:s.id, className:"route-stop" },
        React.createElement('div', { className:"stop-num" }, i+1),
        React.createElement('div', null,
          React.createElement('div', { style:{ fontSize:13, fontWeight:600 } }, `${s.address}, ${s.city}`),
          React.createElement('div', { style:{ fontSize:11, color:"#888" } }, s.name)
        )
      )),
      subs.filter(s=>s.zone===z.id).length === 0 &&
        React.createElement('div', { style:{ fontSize:13, color:"#aaa", textAlign:"center", padding:"0.5rem" } }, "Aucun client dans cette zone")
    ))
  );
}

function App() {
  const [mainView, setMainView] = useState("public");
  const [adminTab, setAdminTab] = useState("dashboard");

  return React.createElement('div', null,
    React.createElement('div', { className:"topbar" },
      React.createElement(Logo),
      React.createElement('div', { className:"tabs-bar" },
        React.createElement('button', { className:`nav-tab ${mainView==="public"?"active":"inactive"}`, onClick:()=>setMainView("public") }, "Accueil"),
        React.createElement('button', { className:`nav-tab ${mainView==="admin"?"active":"inactive"}`, onClick:()=>setMainView("admin") }, "Admin ⚙️")
      )
    ),
    mainView === "public"
      ? React.createElement(PublicView)
      : React.createElement('div', null,
          React.createElement('div', { className:"sub-tabs" },
            [["dashboard","Tableau de bord"],["abonnes","Clients"],["tournees","Collectes"]].map(([id,label]) =>
              React.createElement('button', { key:id, className:`nav-tab ${adminTab===id?"active":"inactive"}`, onClick:()=>setAdminTab(id) }, label)
            )
          ),
          React.createElement(AdminView, { activeTab:adminTab })
        )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
